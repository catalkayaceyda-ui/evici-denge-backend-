name: ev_ici_denge
description: Ev İçi Denge uygulaması.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  speech_to_text: ^7.0.0
  image_picker: ^1.1.2
  audioplayers: ^6.1.0
  file_picker: ^8.1.7
  http: ^1.2.2
  shared_preferences: ^2.3.2
  video_player: ^2.9.2
  flutter_dotenv: ^5.1.0

  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.10

  supabase_flutter: ^2.9.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/app_icon.png